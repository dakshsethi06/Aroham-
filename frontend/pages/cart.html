<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cart — Aroham</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,450;0,550;0,650;1,500&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/pages.css" />
</head>
<body>
  <header class="navbar">
    <a href="../index.html" class="logo">ॐ Aroham</a>
    <nav class="nav-links">
      <a href="../index.html">Home</a>
      <a href="cart.html" class="active">Cart <span id="cart-count" class="cart-badge">0</span></a>
      <a href="orders.html">Orders</a>
      <a href="login.html" id="auth-link">Login</a>
    </nav>
  </header>

  <main class="cart-container">
    <div class="cart-left-col">
      <div id="cart-items-section" class="cart-section">
        <h2 class="cart-section-title">Your Shopping Bag</h2>
        <div id="cart-items-list"></div>
        <div id="cart-items-actions" class="hidden">
          <button class="btn btn-primary full" id="btn-show-checkout" onclick="showAddressSection()">Checkout</button>
        </div>
      </div>

      <div id="address-section" class="cart-section hidden">
        <h2 class="cart-section-title">Shipping Address</h2>
        <form id="address-form" onsubmit="proceedToPayment(event)">
          <div class="form-group">
            <label for="shipping-name">Full Name</label>
            <input type="text" id="shipping-name" placeholder="John Doe" required />
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="shipping-phone">Phone Number</label>
              <input type="tel" id="shipping-phone" placeholder="9876543210" required />
            </div>
            <div class="form-group">
              <label for="shipping-email">Email Address</label>
              <input type="email" id="shipping-email" placeholder="you@example.com" required />
            </div>
          </div>
          <div class="form-group">
            <label for="shipping-address">Street Address</label>
            <input type="text" id="shipping-address" placeholder="Flat/House no., Building, Street name" required />
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="shipping-city">City</label>
              <input type="text" id="shipping-city" placeholder="Mumbai" required />
            </div>
            <div class="form-group">
              <label for="shipping-pincode">Pincode</label>
              <input type="text" id="shipping-pincode" placeholder="400001" required />
            </div>
          </div>
          <div class="address-actions">
            <button type="button" class="btn btn-outline" onclick="showCartSection()">Back to Bag</button>
            <button type="submit" class="btn btn-primary">Proceed to Payment</button>
          </div>
        </form>
      </div>
    </div>

    <div class="cart-right-col">
      <div class="summary-card">
        <h3>Order Summary</h3>
        <div id="summary-items-list"></div>
        <div class="summary-details">
          <div class="summary-detail-row"><span>Subtotal</span><span id="summary-subtotal">₹0</span></div>
          <div class="summary-detail-row"><span>Shipping</span><span id="summary-shipping">Free</span></div>
          <div class="summary-detail-row total"><span>Total</span><strong id="summary-total">₹0</strong></div>
        </div>
        <button id="btn-pay" class="btn btn-primary full hidden" onclick="payNow()">Pay with Razorpay</button>
      </div>
    </div>
  </main>

  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/config.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/cart-ui.js"></script>
  <script src="../js/cart-checkout.js"></script>
</body>
</html>
