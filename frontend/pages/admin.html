<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aroham — Admin Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,450;0,550;0,650;1,500&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/pages.css" />
  <style>
    .admin-wrap { max-width: 1300px; margin: 0 auto; padding: 30px 4vw 60px; }

    .admin-header { margin-bottom: 32px; }
    .admin-header h1 {
      font-family: 'Fraunces', serif; font-size: 2.2rem; color: var(--night);
      margin-bottom: 4px; display: flex; align-items: center; gap: 12px;
    }
    .admin-header p { color: var(--muted); font-size: 0.92rem; }

    /* ── Stat Cards ── */
    .stat-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 32px; }
    .stat-card {
      background: var(--card); border: 1px solid var(--line); border-radius: 16px;
      padding: 24px 24px 20px; box-shadow: 0 4px 16px rgba(74,21,33,0.04);
      position: relative; overflow: hidden; transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .stat-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(74,21,33,0.08); }
    .stat-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px;
      background: linear-gradient(90deg, var(--maroon), var(--marigold));
      border-radius: 16px 16px 0 0;
    }
    .stat-card.revenue::before { background: linear-gradient(90deg, var(--marigold), #e8b84a); }
    .stat-icon {
      width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center;
      justify-content: center; font-size: 1.2rem; margin-bottom: 14px;
    }
    .stat-icon.orders { background: rgba(74,21,33,0.08); }
    .stat-icon.shipped { background: rgba(30,130,76,0.08); }
    .stat-icon.pending { background: rgba(212,155,44,0.1); }
    .stat-icon.revenue { background: rgba(212,155,44,0.12); }
    .stat-label { font-size: 0.78rem; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 6px; }
    .stat-value { font-family: 'Fraunces', serif; font-size: 2rem; color: var(--night); font-weight: 600; }
    .stat-card.revenue .stat-value { color: var(--marigold-deep); }

    /* ── Table Container ── */
    .admin-table-wrap {
      background: var(--card); border: 1px solid var(--line); border-radius: 16px;
      box-shadow: 0 4px 20px rgba(74,21,33,0.04); overflow: hidden;
    }
    .table-header {
      padding: 20px 24px; border-bottom: 1px solid var(--line);
      display: flex; justify-content: space-between; align-items: center;
    }
    .table-header h3 { font-family: 'Fraunces', serif; font-size: 1.2rem; color: var(--night); }
    .table-header .badge {
      background: rgba(74,21,33,0.06); color: var(--maroon); font-size: 0.78rem;
      font-weight: 700; padding: 4px 12px; border-radius: 20px;
    }
    .table-scroll { overflow-x: auto; }
    .admin-table { width: 100%; border-collapse: collapse; min-width: 950px; }
    .admin-table thead { background: var(--night); }
    .admin-table th {
      padding: 14px 20px; text-align: left; font-size: 0.72rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.8px; color: rgba(250,246,236,0.85);
    }
    .admin-table td {
      padding: 16px 20px; border-bottom: 1px solid rgba(234,230,223,0.6);
      font-size: 0.88rem; vertical-align: middle;
    }
    .admin-table tbody tr { transition: background 0.15s ease; }
    .admin-table tbody tr:hover { background: rgba(212,155,44,0.03); }
    .admin-table tbody tr:last-child td { border-bottom: none; }

    /* ── Order ID cell ── */
    .order-id { font-family: monospace; font-size: 0.72rem; color: var(--muted); word-break: break-all; max-width: 140px; }
    .order-date-cell { font-size: 0.78rem; color: var(--muted); margin-top: 4px; }

    /* ── Status Pills ── */
    .pill {
      display: inline-block; padding: 5px 14px; border-radius: 20px;
      font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.4px;
    }
    .pill-success { background: #e6f4e6; color: #1a7a1d; }
    .pill-pending { background: #fdf1dc; color: #a06400; }
    .pill-failed { background: #fde8e8; color: #a12020; }
    .pill-cancelled { background: #f0f0f0; color: #888; }
    .pill-refunded { background: #f0ebf8; color: #6b3eb8; }

    /* ── AWB Code ── */
    .awb-code {
      font-family: 'Outfit', monospace; font-size: 0.82rem; color: var(--night);
      background: rgba(74,21,33,0.04); padding: 4px 10px; border-radius: 6px;
      display: inline-block;
    }
    .awb-none { color: var(--muted); font-size: 0.82rem; }

    /* ── Action Buttons ── */
    .action-group { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .btn-label {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 7px 14px; border-radius: 8px; font-size: 0.78rem; font-weight: 600;
      background: var(--maroon); color: #fff; text-decoration: none;
      transition: all 0.2s ease; border: none; cursor: pointer;
    }
    .btn-label:hover { background: var(--night-2); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(74,21,33,0.15); }
    .btn-cancel {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 7px 14px; border-radius: 8px; font-size: 0.78rem; font-weight: 600;
      background: transparent; color: var(--maroon); border: 1.5px solid rgba(74,21,33,0.2);
      cursor: pointer; transition: all 0.2s ease;
    }
    .btn-cancel:hover { background: #fde8e8; border-color: #d44; color: #a12020; }
    .btn-cancel:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-cancel.done { background: #f0f0f0; border-color: #ddd; color: #999; pointer-events: none; }

    /* ── Responsive ── */
    @media (max-width: 900px) { .stat-row { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 500px) { .stat-row { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <!-- Navbar -->
  <header class="navbar">
    <a href="../index.html" class="logo-wrap" style="display: flex; align-items: center; gap: 10px;">
      <span class="logo-badge" style="display: inline-flex; align-items: center; justify-content: center; width: 34px; height: 34px; border-radius: 50%; background: var(--maroon); color: #fff; font-size: 1.1rem; font-weight: bold;">ॐ</span>
      <span class="logo-text" style="font-family: 'Fraunces', serif; font-size: 1.5rem; font-weight: 700; color: var(--maroon); letter-spacing: -0.5px;">Aroham</span>
    </a>
    <nav class="nav-links">
      <a href="../index.html">Store</a>
    </nav>
    <div class="nav-actions" style="display: flex; align-items: center; gap: 20px;">
      <a href="login.html" id="auth-link" class="btn btn-primary" style="padding: 8px 20px; font-size: 0.88rem;">Sign In</a>
    </div>
  </header>

  <div class="admin-wrap">
    <div class="admin-header">
      <h1>📦 Order Management</h1>
      <p>Track payments, shipments, and print Shiprocket labels — all in one place.</p>
    </div>

    <!-- Stat Cards -->
    <div class="stat-row">
      <div class="stat-card">
        <div class="stat-icon orders">📋</div>
        <div class="stat-label">Total Orders</div>
        <div class="stat-value" id="stat-total">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon shipped">🚚</div>
        <div class="stat-label">Shipped</div>
        <div class="stat-value" id="stat-shipped">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon pending">⏳</div>
        <div class="stat-label">Pending Shipment</div>
        <div class="stat-value" id="stat-pending">0</div>
      </div>
      <div class="stat-card revenue">
        <div class="stat-icon revenue">💰</div>
        <div class="stat-label">Paid Revenue</div>
        <div class="stat-value" id="stat-revenue">₹0</div>
      </div>
    </div>

    <!-- Orders Table -->
    <div class="admin-table-wrap">
      <div class="table-header">
        <h3>Recent Orders</h3>
        <span class="badge" id="order-count-badge">0 orders</span>
      </div>
      <div class="table-scroll">
        <table class="admin-table">
          <thead>
            <tr>
              <th>Order</th>
              <th>Customer</th>
              <th>Items</th>
              <th>Total</th>
              <th>Payment</th>
              <th>AWB Code</th>
              <th>Label</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="admin-body">
            <tr><td colspan="8" style="text-align:center;padding:50px;color:var(--muted);">Loading orders...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/config.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/admin.js"></script>
</body>
</html>
